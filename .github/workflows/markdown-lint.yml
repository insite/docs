name: Markdown lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches: [master]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlintignore'
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !node_modules
            !**/SUMMARY.md
